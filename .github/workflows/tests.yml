name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Standard unit tests — no external dependencies required
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov matplotlib

      - name: Clone main app (real-context integration tests)
        run: |
          git clone --depth 1 \
            https://github.com/HiroYokoyama/python_molecular_editor.git \
            ../python_molecular_editor || true

      - name: Run tests
        env:
          CI_MAIN_APP_SRC: ${{ github.workspace }}/../python_molecular_editor/moleditpy/src
        run: python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        env:
          CI_MAIN_APP_SRC: ${{ github.workspace }}/../python_molecular_editor/moleditpy/src
        run: python -m pytest tests/ --cov=orca_result_analyzer --cov-report=term-missing

  # -------------------------------------------------------------------------
  # Integration tests — clones the main MoleditPy app to enable real
  # PluginContext tests (TestWithRealPluginContext, TestAPIChecker)
  # -------------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest matplotlib

      - name: Clone main MoleditPy application
        run: |
          git clone --depth 1 \
            https://github.com/HiroYokoyama/python_molecular_editor.git \
            ../python_molecular_editor

      - name: Install main app package (no heavy deps)
        run: |
          pip install -e ../python_molecular_editor/moleditpy \
            --no-deps --quiet || true

      - name: Run integration tests with real PluginContext
        env:
          CI_MAIN_APP_SRC: ${{ github.workspace }}/../python_molecular_editor/moleditpy/src
        run: python -m pytest tests/test_plugin_integration.py tests/test_api.py -v
